site_name: ExecutionKit
site_description: Composable LLM reasoning patterns. Provider-agnostic. Zero SDK lock-in.
site_url: https://tafreeman.github.io/executionkit/
repo_url: https://github.com/tafreeman/executionkit
repo_name: tafreeman/executionkit
edit_uri: edit/main/docs/

# Exclude internal/legacy artifacts from the public site without deleting them.
exclude_docs: |
  analysis/
  planning/
  review-process/
  c4/
  test-audit/

# Quiet strict-mode complaints about files we keep in the docs tree but don't
# link from nav (legacy references, snippets, etc.).
validation:
  omitted_files: info
  absolute_links: info
  unrecognized_links: info
  anchors: info

theme:
  name: material
  # Console design system is a g100 dark-only language — no light scheme.
  palette:
    scheme: slate
    primary: black
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  # Note: social cards are NOT enabled here. To generate og:image/Twitter card
  # meta tags, add the 'social' plugin under `plugins:` and install cairosvg+pillow.

extra_css:
  - stylesheets/tokens.css
  - stylesheets/console.css
  - stylesheets/landing.css

plugins:
  - search
  - tags
  - mermaid2
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            heading_level: 3

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Provider Setup: getting-started/providers.md
  - Patterns:
      - Overview: patterns/index.md
      - Consensus: patterns/consensus.md
      - Iterative Refinement: patterns/iterative-refinement.md
      - ReAct Tool Loop: patterns/react-loop.md
      - Structured Output: patterns/structured.md
      - Pipe (Composition): patterns/pipe.md
      - Map-Reduce: patterns/map-reduce.md
  - Recipes:
      - Multi-provider failover: recipes/failover.md
      - Cost-aware routing: recipes/cost-routing.md
      - Conversational assistant: recipes/assistant.md
      - Combining patterns: recipes/composition.md
  - API Reference:
      - Core: api/core.md
      - Adapters: api/adapters.md
      - Configuration: api/configuration.md
  - Project:
      - Architecture: architecture.md
      - Security: security.md
      - Architecture Decisions:
          - Overview: adr/README.md
          - Structural Protocols: adr/001-structural-protocols.md
          - Flat Package Layout: adr/002-flat-layout.md
          - Single Provider: adr/003-single-provider.md
          - Zero Runtime Dependencies: adr/004-zero-runtime-dependencies.md
          - Caller-Supplied Cost Rates: adr/005-caller-supplied-cost-rates.md
          - Eval Failure Corpus: adr/006-eval-failure-corpus.md
          - Async-First Design: adr/007-async-first-sync-wrappers.md
          - Workflow Checkpoint Resume: adr/008-workflow-checkpoint-resume.md
          - Approval Gate Timeout Policy: adr/009-approval-gate-timeout-policy.md
          - Optional OTel Span Emission: adr/010-optional-otel-span-emission.md
          - Map-Reduce Pattern: adr/011-map-reduce-pattern.md
          - Stdlib MCP Server: adr/012-stdlib-mcp-server.md
          - Claude-in-CI Eval: adr/013-claude-in-ci-eval.md
          - Message Batches: adr/014-message-batches.md
          - React Loop Tool Sandbox: adr/015-react-loop-tool-sandbox.md
      - Changelog: changelog.md
      - Contributing: contributing.md
      - License: license.md

extra:
  # Social preview image (og:image) — used by Material's social plugin and meta
  og_image: assets/executionkit-social.png
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tafreeman/executionkit
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/executionkit/
    - icon: fontawesome/solid/house
      link: https://github.com/tafreeman
      name: tafreeman profile
