# SonarQube analysis configuration for ExecutionKit
# Server-side project key: "executionkit"
#
# Secrets are NOT stored in this file. Provide these at scan time instead:
#   sonar.host.url  -> http://localhost:9000 (from host) / http://host.docker.internal:9000 (from a container)
#   sonar.token     -> env SONAR_TOKEN or -Dsonar.token=...   (NEVER commit a token)

sonar.projectKey=executionkit
sonar.projectName=ExecutionKit

# --- Source layout (flat: the package lives at the repo root) ---
sonar.sources=executionkit
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python versions this project supports (drives Python rule selection)
sonar.python.version=3.11, 3.12, 3.13

# --- Test & coverage reports (optional; generate before a scan) ---
#   pytest --cov=executionkit --cov-report=xml --junitxml=test-results.xml
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# --- Exclusions ---
# Demo scripts and build artifacts are kept out of the main quality metrics.
sonar.exclusions=examples/**, dist/**, build/**, site/**, **/__pycache__/**, **/*.pyc
