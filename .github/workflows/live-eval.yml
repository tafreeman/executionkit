name: Live Eval (real model)

# Real-endpoint evidence for the opt-in live tiers (per-pattern regression +
# judge calibration). This is NOT a required gate: it runs on demand and weekly
# against a local Ollama model so the env-gated live evals actually execute and
# their results are uploaded as an artifact. It never runs on pull_request, so a
# flaky model response can never block a PR.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

permissions:
  contents: read

jobs:
  live-eval:
    name: "Live provider eval (Ollama)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EXECUTIONKIT_LIVE_EVAL: "1"
      EXECUTIONKIT_BASE_URL: "http://localhost:11434/v1"
      # Small, tool-calling-capable instruct model (the ReAct eval needs tools).
      EXECUTIONKIT_MODEL: "llama3.2:3b"
      OLLAMA_VERSION: "0.30.7"
      OLLAMA_LINUX_AMD64_SHA256: "88c110a6c9a9130e5ed0aa90f47e8ddb013cb638d834e11ddf1517615704d34c"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install and start pinned Ollama
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd
          curl -fsSLo /tmp/ollama-linux-amd64.tar.zst \
            "https://github.com/ollama/ollama/releases/download/v${OLLAMA_VERSION}/ollama-linux-amd64.tar.zst"
          echo "${OLLAMA_LINUX_AMD64_SHA256}  /tmp/ollama-linux-amd64.tar.zst" | sha256sum -c -
          sudo tar --use-compress-program=unzstd -xf /tmp/ollama-linux-amd64.tar.zst -C /usr/local
          ollama --version

          # Start a detached server and wait for readiness.
          nohup ollama serve >/tmp/ollama.log 2>&1 &
          if ! curl -sf http://localhost:11434/api/version >/dev/null 2>&1; then
            sleep 2
          fi
          for _ in $(seq 1 30); do
            curl -sf http://localhost:11434/api/version >/dev/null 2>&1 && break
            sleep 2
          done
          curl -sf http://localhost:11434/api/version >/dev/null 2>&1 \
            || { echo "Ollama failed to start"; cat /tmp/ollama.log 2>/dev/null; exit 1; }

      - name: Pull model
        run: ollama pull "$EXECUTIONKIT_MODEL"

      - name: Run live eval tier
        run: |
          pytest tests/test_live_regression.py tests/test_judge_calibration.py \
            -v --no-cov -p no:cacheprovider --junitxml=live-eval-results.xml

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-eval-results
          path: live-eval-results.xml
          if-no-files-found: warn
