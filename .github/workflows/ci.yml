name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check executionkit/ tests/

      - name: Format check (ruff)
        run: ruff format --check executionkit/ tests/

      - name: Type check (mypy)
        run: mypy --strict executionkit/

      - name: Tests with coverage
        run: pytest tests/ --cov=executionkit --cov-report=term-missing --cov-report=xml --cov-fail-under=80 -q

      - name: Eval suite (deterministic goldens + failure corpus)
        run: pytest tests/test_eval_goldens.py tests/test_eval_failure_corpus.py tests/test_eval_metrics.py --no-cov -p no:cacheprovider -q

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          # The enforced gate is pytest's --cov-fail-under=80 above. Codecov
          # upload stays advisory until the repository has a Codecov token.
          fail_ci_if_error: false

  security:
    name: "Security scan (Bandit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit SAST scan
        run: bandit -r executionkit/ -c pyproject.toml

      - name: Dependency audit (pip-audit)
        run: pip install pip-audit && pip-audit --requirement requirements.lock
