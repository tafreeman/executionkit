name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check executionkit/ tests/

      - name: Format check (ruff)
        run: ruff format --check executionkit/ tests/

      - name: Type check (mypy)
        run: mypy --strict executionkit/

      - name: Security scan (Bandit)
        run: bandit -r executionkit/ -c pyproject.toml

      - name: Tests with coverage
        run: pytest tests/ --cov=executionkit --cov-report=term-missing --cov-fail-under=80 -x -q
jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verification tools
        run: |
          python -m pip install --upgrade pip
          pip install . pytest mypy bandit ruff

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Run type checks
        run: mypy .

      - name: Run security checks
        run: bandit -r .

  build:
    name: Build distribution
    needs: verify
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/executionkit/
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
